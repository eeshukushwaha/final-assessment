<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCart Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">QuickCart Dashboard</span>
            <button class="btn btn-outline-light ms-auto">
                Cart <span id="cart-count" class="badge bg-danger">0</span>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 g-3">
            <div class="col-12 col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by product name...">
            </div>
            <div class="col-12 col-md-4">
                <select id="categoryFilter" class="form-select">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div class="col-12 col-md-4">
                <select id="sortOption" class="form-select">
                    <option value="default">Sort by</option>
                    <option value="lowToHigh">Price: Low to High</option>
                    <option value="highToLow">Price: High to Low</option>
                </select>
            </div>
        </div>

        <div id="loader" class="text-center d-none my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

        <div id="product-list" class="row g-4"></div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="Product" class="img-fluid mb-3">
                    <p id="modalDescription" class="text-muted small"></p>
                    <h4 id="modalPrice" class="text-success fw-bold"></h4>
                    <p><strong>Rating: </strong><span id="modalRating"></span> <span class="text-warning">★</span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
